name: "Syn"
description: >-
  AI-assisted scene creation for Home Assistant using room entities, lights,
  switches, TVs, media players, and natural language prompts.
version: "0.2.7"
slug: "syn"
url: "https://github.com/architechlabs/syn"
init: false
startup: services
boot: auto
arch:
  - amd64
  - armv7
  - aarch64
ingress: true
ingress_port: 8000
panel_icon: mdi:creation
panel_title: Syn
watchdog: "http://[HOST]:[PORT:8000]/docs"
ports:
  8000/tcp: null
ports_description:
  8000/tcp: "Syn API and web interface (ingress preferred)"
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: homeassistant
map:
  - config:rw
environment:
  PORT: "8000"
options:
  api_key: ""
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "deepseek-ai/deepseek-v4-pro"
  temperature: 0.0
  request_timeout: 30
  max_tokens: 1800
  fallback_on_error: true
  ha_url: "http://supervisor/core/api"
  ha_token: ""
  port: 8000
  log_level: "INFO"
schema:
  api_key: "str?"
  base_url: "url"
  model: "str"
  temperature: "float(0,1)"
  request_timeout: "int(5,120)"
  max_tokens: "int(256,8192)"
  fallback_on_error: "bool"
  ha_url: "url"
  ha_token: "password?"
  port: port
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
